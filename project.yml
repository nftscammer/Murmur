name: Murmur
options:
  bundleIdPrefix: com.murmur
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.0
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.27.0
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.9.0

targets:
  Murmur:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Whisperbar
        excludes:
          - Resources/Info.plist
    resources:
      - path: Whisperbar/Resources
      - path: Whisperbar/Resources/Assets.xcassets
    info:
      path: Whisperbar/Resources/Info.plist
      properties:
        CFBundleName: Murmur
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleIconFile: AppIcon
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSMicrophoneUsageDescription: "Murmur needs microphone access to record your voice for transcription."
        NSSpeechRecognitionUsageDescription: "Murmur uses on-device speech recognition to transcribe your voice."
        SUPublicEDKey: "NfnnuSxPTAqXYgSi/YETwMct34EBq8nhrnBa+Bbt5zo="
        SUFeedURL: "https://nftscammer.github.io/Murmur/appcast.xml"
    entitlements:
      path: Whisperbar/Whisperbar.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.murmur.app
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_OBJC_BRIDGING_HEADER: Whisperbar/Whisperbar-Bridging-Header.h
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_SWIFT_FLAGS: ""
        CLANG_ENABLE_MODULES: YES
        GCC_OPTIMIZATION_LEVEL: s
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: GRDB
        product: GRDB
      - package: WhisperKit
        product: WhisperKit
      - framework: Sparkle.xcframework
        embed: true
